<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <a href="index.html">About Me</a>
            </div>
            <div class="nav-menu">
                <a href="Index.html" class="nav-link">Beranda</a>
                <a href="about.html" class="nav-link">Tentang Saya</a>
                <a href="Contact.html" class="nav-link">Kontak</a>
            </div>
        </div>
    </nav>

    <!-- Contact Section -->
    <section class="contact-section">
        <div class="container">
            <h1 class="section-title">Hubungi Saya</h1>
            <div class="contact-content">
                <div class="contact-info">
                    <h2>Informasi Kontak</h2>
                    <div class="contact-item">
                        <strong>Email:</strong> agnesiahega140@gmail.com
                    </div>
                    <div class="contact-item">
                        <strong>Instagram:</strong> @agnshaaaa
                    </div>
                    <div class="contact-item">
                        <strong>LinkedIn:</strong> Agnesia Hega
                    </div>
                </div>
                <div class="contact-form">
                    <h2>Kirim Pesan</h2>
                    <form action="#" method="post">
                        <div class="form-group">
                            <label for="name">Nama Lengkap:</label>
                            <input type="text" id="name" name="name" required>
                        </div>
                        <div class="form-group">
                            <label for="email">Email:</label>
                            <input type="email" id="email" name="email" required>
                        </div>
                        <div class="form-group">
                            <label for="message">Pesan:</label>
                            <textarea id="message" name="message" rows="5" required></textarea>
                        </div>
                        <button type="submit" class="submit-btn">Kirim Pesan</button>
                    </form>
                </div>
            </div>
        </div>
    </section>
